<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>마이호미</title>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAABmJLR0QA/wD/AP+gvaeTAAAAV0lEQVQ4jWNgGAWDDvz//5+BkpiamoGBhIQEMoYKMDAwMDDQ09OTkZGRlZeXV5SXl9dWUFDQVlRU1FVUVNRVU1PTU1NT01NTU9NTU1PTU1PTU1PTAwANzAoPs4Qu3gAAAABJRU5ErkJggg==">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🏡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F4EC;--bg2:#EEE9DC;
  --surface:#FDFBF5;--surface2:#F4EFE3;
  --border:#DDD7C8;--border2:#C8C0AE;
  --green:#003631;--yellow:#FFEDA8;
  --text:#1A1F1E;--text-sub:#4A5754;--text-hint:#9EAAA8;
  --high:#B83232;--mid:#A07020;--low:#003631;
  --r:14px;--r-sm:9px;
  --font:'Gowun Dodum',sans-serif;
  --shadow:0 2px 14px rgba(0,54,49,0.09);
  --tab-h:60px;
  --top-h:0px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--green);color:var(--text);display:flex;flex-direction:column;}

/* ══ 상단 고정 ══ */
.top-fixed{flex-shrink:0;background:var(--green);padding:1.1rem 1.5rem .9rem;}

.top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.app-left{display:flex;flex-direction:column;gap:2px;}
.app-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--yellow);opacity:.5;text-transform:uppercase;}
.app-date{font-size:13px;color:var(--yellow);opacity:.45;}
.app-time{font-size:48px;font-weight:700;color:var(--yellow);line-height:1;}

/* 날씨 */
.weather-row{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid rgba(255,237,168,.18);padding-top:.65rem;margin-bottom:.6rem;}
.weather-temp{font-size:42px;font-weight:700;color:var(--yellow);line-height:1;}
.weather-temp sup{font-size:18px;vertical-align:super;}
.weather-info{text-align:right;}
.weather-desc{font-size:16px;font-weight:700;color:var(--yellow);}
.weather-sub{font-size:13px;color:var(--yellow);opacity:.55;margin-top:2px;}
.weather-detail{display:flex;gap:0;border-top:1px solid rgba(255,237,168,.12);padding-top:.5rem;}
.wd-item{flex:1;text-align:center;border-right:1px solid rgba(255,237,168,.1);}
.wd-item:last-child{border-right:none;}
.wd-label{font-size:11px;color:var(--yellow);opacity:.4;margin-bottom:2px;}
.wd-val{font-size:15px;font-weight:700;color:var(--yellow);}
.weather-loading{color:var(--yellow);opacity:.4;font-size:13px;text-align:center;padding:1rem 0;}

/* 음악 무드 버튼 */
.music-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.mood-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,237,168,.25);background:rgba(255,237,168,.08);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.mood-chip:active{background:rgba(255,237,168,.2);}
.mood-chip-icon{font-size:14px;}
.mood-chip-label{font-size:13px;color:var(--yellow);opacity:.8;}

/* ══ 탭 영역 ══ */
.tab-area{flex:1;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}

/* 인덱스 탭바 */
.tabbar{display:flex;align-items:flex-end;background:var(--green);padding:0 6px;flex-shrink:0;gap:3px;}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:7px 2px 8px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
  border-radius:10px 10px 0 0;position:relative;transition:all .18s;
  background:rgba(255,237,168,.12);border:1px solid rgba(255,237,168,.18);border-bottom:none;
  margin-bottom:0;transform:translateY(2px);
}
.tab-btn.active{
  background:var(--bg);border-color:var(--border);transform:translateY(0);
  padding-bottom:10px;z-index:2;
}
.tab-btn.active::after{display:none;}
.tab-icon{font-size:18px;line-height:1;}
.tab-label{font-size:10px;color:rgba(255,237,168,.6);}
.tab-btn.active .tab-label{color:var(--green);font-weight:700;}
.tab-btn.active .tab-icon{filter:none;}

/* 탭 컨텐츠 */
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none;background:var(--bg);}
.tab-content.active{display:block;}
.tab-inner{padding:1.25rem;}
.sec-title{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);opacity:.5;margin-bottom:8px;}

/* ══ 공통 카드 ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;}
.card-pad{padding:1rem 1.1rem;}

/* ══ 홈 탭 ══ */
.home-section{margin-bottom:14px;}
.home-sec-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);opacity:.45;margin-bottom:7px;}

/* 홈 할일 미리보기 */
.home-todo-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.home-todo-item:last-child{border-bottom:none;}
.home-todo-dot{width:6px;height:6px;border-radius:50%;background:#D6EDD6;flex-shrink:0;}
.home-todo-text{font-size:16px;color:var(--text);}
.home-empty{font-size:15px;color:var(--text-hint);padding:8px 0;font-style:italic;}

/* 홈 운동 미리보기 */
.home-workout-theme{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.home-workout-list{display:flex;flex-direction:column;gap:4px;}
.home-workout-item{font-size:15px;color:var(--text-sub);}

/* 홈 참깨 알럿 */
.home-care-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.home-care-item:last-child{border-bottom:none;}
.home-care-icon{font-size:18px;}
.home-care-body{flex:1;}
.home-care-name{font-size:15px;font-weight:700;color:var(--text);}
.home-care-due{font-size:13px;color:var(--high);}
.home-care-ok{font-size:15px;color:var(--text-hint);padding:8px 0;font-style:italic;}

/* ══ 할일 탭 ══ */
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:.9rem;}
.prog-track{flex:1;height:5px;background:var(--bg2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .35s;}
.prog-label{font-size:14px;color:var(--text-hint);min-width:36px;text-align:right;}
.date-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:.9rem;}
.date-scroll::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:#FFF8DC;cursor:pointer;transition:all .18s;}
.dtab.active{background:var(--green);border-color:var(--green);}
.dtab .dn{font-size:11px;color:var(--text-hint);}
.dtab.active .dn{color:var(--yellow);}
.dtab .dd{font-size:18px;font-weight:700;color:var(--text);}
.dtab.active .dd{color:var(--yellow);}
.dtab .dots{display:flex;gap:3px;height:4px;}
.dtab .dot{width:4px;height:4px;border-radius:50%;background:var(--border2);}
.dtab.active .dot{background:var(--yellow);opacity:.6;}
.todo-add{display:flex;align-items:center;gap:9px;margin-bottom:.9rem;}
.todo-add-icon{width:34px;height:34px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--yellow);flex-shrink:0;transition:transform .15s;}
.todo-add-icon:active{transform:scale(.9);}
.todo-add-input{flex:1;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r-sm);font-family:var(--font);font-size:17px;color:var(--text);outline:none;padding:9px 12px;}
.todo-add-input::placeholder{color:var(--text-hint);}
.prio-btn{font-size:13px;padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text-sub);cursor:pointer;flex-shrink:0;}
.prio-btn.ph{background:#FAEDEB;border-color:#E8B0AC;color:var(--high);}
.prio-btn.pm{background:#FDF6E7;border-color:#E8D08A;color:var(--mid);}
.prio-btn.pl{background:#E8F0EE;border-color:#9ABFBA;color:var(--low);}
.todo-list{display:flex;flex-direction:column;gap:7px;}
.todo-sec-label{font-size:12px;letter-spacing:.08em;color:var(--text-hint);text-transform:uppercase;padding:5px 0 2px;}
.swipe-outer{position:relative;border-radius:var(--r-sm);overflow:hidden;}
.swipe-bg{position:absolute;inset:0;display:none;align-items:center;border-radius:var(--r-sm);}
.swipe-bg-done{background:var(--green);justify-content:flex-start;padding-left:16px;}
.swipe-bg-del{background:var(--high);justify-content:flex-end;padding-right:16px;}
.swipe-bg span{color:var(--yellow);font-size:13px;}
.todo-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 13px;display:flex;align-items:flex-start;gap:10px;will-change:transform;cursor:grab;}
.todo-item.done-item{opacity:.5;}
.todo-item.drag-over{border-color:var(--green);border-style:dashed;}
.ck-circle{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;color:transparent;font-size:12px;}
.done-item .ck-circle{background:var(--green);border-color:var(--green);color:var(--yellow);}
.item-body{flex:1;min-width:0;}
.item-text{font-size:17px;line-height:1.4;word-break:break-all;}
.done-item .item-text{text-decoration:line-through;color:var(--text-hint);}
.item-prio{display:inline-block;font-size:12px;padding:2px 8px;border-radius:99px;margin-top:4px;}
.ip-high{background:#FAEDEB;color:var(--high);}.ip-mid{background:#FDF6E7;color:var(--mid);}.ip-low{background:#E8F0EE;color:var(--low);}
.item-memo{font-size:14px;color:var(--text-sub);margin-top:4px;line-height:1.5;word-break:break-all;}
.drag-handle{color:var(--text-hint);font-size:17px;flex-shrink:0;user-select:none;}
.item-actions{display:flex;gap:3px;margin-top:6px;}
.act-btn{font-size:13px;color:var(--text-hint);border:none;background:transparent;cursor:pointer;padding:2px 7px;border-radius:3px;}
.act-btn.del:active{color:var(--high);}
.memo-ta{width:100%;font-family:var(--font);font-size:14px;color:var(--text-sub);border:1px solid var(--border);border-radius:6px;background:var(--bg2);padding:6px 9px;outline:none;resize:none;margin-top:5px;line-height:1.5;display:none;}
.todo-empty{text-align:center;padding:2rem 0;color:var(--text-hint);font-size:16px;}

/* ══ 일정 탭 ══ */
.sched-who-row{display:flex;gap:6px;margin-bottom:.8rem;}
.sched-who-btn{font-size:15px;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text-sub);cursor:pointer;transition:all .15s;}
.sched-who-btn.sel-me{background:#D6EDD6;border-color:#9ABFBA;color:var(--green);}
.sched-who-btn.sel-partner{background:#FFF3C4;border-color:#E8D08A;color:#7A5E00;}
.sched-who-btn.sel-both{background:#E8E8F8;border-color:#AAAACC;color:#333366;}
.sched-add-row{display:flex;gap:7px;margin-bottom:.5rem;flex-wrap:wrap;}
.sched-inp{flex:1;min-width:100px;font-family:var(--font);font-size:15px;color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);padding:8px 11px;outline:none;}
.sched-inp::placeholder{color:var(--text-hint);}
.sched-date-row{display:flex;gap:7px;margin-bottom:.9rem;flex-wrap:wrap;align-items:center;}
.sched-date-inp{font-family:var(--font);font-size:14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text-sub);padding:7px 9px;outline:none;flex:1;}
.sched-date-sep{font-size:15px;color:var(--text-hint);}
.sched-time-inp{font-family:var(--font);font-size:14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text-sub);padding:7px 9px;outline:none;width:105px;}
.sched-add-btn{font-size:15px;padding:8px 14px;border-radius:var(--r-sm);border:none;background:var(--green);color:var(--yellow);cursor:pointer;font-weight:700;}
.cal-wrap{margin-bottom:1rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.cal-month{font-size:18px;font-weight:700;color:var(--text);}
.cal-nav{font-size:18px;width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{font-size:12px;color:var(--text-hint);text-align:center;padding:4px 0 5px;}
.cal-day-label:first-child{color:var(--high);}
.cal-day-label:last-child{color:#185FA5;}
.cal-cell{border-radius:var(--r-sm);padding:4px 2px;min-height:44px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cal-cell:active{background:var(--bg2);}
.cal-cell.other-month .cal-num-inner{opacity:.25;}
.cal-cell.today .cal-num-inner{background:var(--green);color:var(--yellow);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:#FFF8DC;}
.cal-num{font-size:15px;font-weight:700;color:var(--text);width:26px;text-align:center;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cal-dot-me{background:#6BAF6B;}.cal-dot-partner{background:#E8C84A;}.cal-dot-both{background:#8888CC;}.cal-dot-care{background:#9EAAA8;}
.cal-day-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);opacity:.5;margin-bottom:6px;}
.sched-list{display:flex;flex-direction:column;gap:6px;}
.sched-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 13px;display:flex;align-items:center;gap:9px;}
.sched-item-who{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sched-who-me{background:#6BAF6B;}.sched-who-partner{background:#E8C84A;}.sched-who-both{background:#8888CC;}.sched-who-care{background:#9EAAA8;}
.sched-item-body{flex:1;min-width:0;}
.sched-item-title{font-size:15px;font-weight:700;color:var(--text);}
.sched-item-time{font-size:13px;color:var(--text-hint);margin-top:2px;}
.sched-item-del{font-size:13px;color:var(--text-hint);border:none;background:transparent;cursor:pointer;padding:3px 6px;}
.sched-empty{text-align:center;padding:1.5rem 0;color:var(--text-hint);font-size:15px;}

/* ══ 운동 탭 ══ */
.workout-header{background:var(--green);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:12px;}
.workout-day-theme{font-size:22px;font-weight:700;color:var(--yellow);margin-bottom:4px;}
.workout-day-sub{font-size:14px;color:var(--yellow);opacity:.6;}
.workout-progress-wrap{margin-top:10px;}
.workout-prog-label{display:flex;justify-content:space-between;font-size:13px;color:var(--yellow);opacity:.7;margin-bottom:5px;}
.workout-prog-track{height:6px;background:rgba(255,237,168,.2);border-radius:99px;overflow:hidden;}
.workout-prog-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* 포도알 스티커 */
.grape-board{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:12px;}
.grape-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;}
.grape-title{font-size:14px;font-weight:700;color:var(--text);}
.grape-count{font-size:13px;color:var(--text-hint);}
.grape-goal{font-size:12px;color:var(--text-hint);margin-bottom:.9rem;}
.grape-goal b{color:#7B4FA6;}
.grape-bunch{display:flex;flex-direction:column;align-items:center;gap:0;position:relative;}
.grape-stem{width:3px;height:18px;background:#6B8C42;border-radius:99px;margin-bottom:2px;}
.grape-leaf{font-size:22px;line-height:1;margin-bottom:-4px;}
.grape-row{display:flex;justify-content:center;gap:5px;margin-top:-4px;}
.grape-ball{
  width:38px;height:38px;border-radius:50%;
  border:2px solid #D9C4EE;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#C9ADE8;font-weight:700;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  position:relative;cursor:default;
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.06);
}
.grape-ball.filled{
  background:radial-gradient(circle at 35% 35%, #A87DD1, #6B3FA0);
  border-color:#7B4FA6;
  color:transparent;
  box-shadow:0 3px 10px rgba(107,63,160,.35),inset 0 1px 2px rgba(255,255,255,.3);
}
.grape-ball.filled::before{
  content:'';position:absolute;top:6px;left:8px;
  width:10px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.35);transform:rotate(-30deg);
}
.grape-reward{margin-top:.85rem;padding:.65rem .9rem;background:#F5EEFF;border:1.5px solid #C9ADE8;border-radius:var(--r-sm);font-size:14px;color:#7B4FA6;text-align:center;display:none;animation:popIn .3s ease;}
.grape-reward.show{display:block;}
@keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}

/* 운동 카드 */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.exercise-card.done{opacity:.55;}
.exercise-card:active{transform:scale(.99);}
.exercise-card-top{display:flex;align-items:center;gap:12px;padding:13px 15px;}
.ex-num{width:30px;height:30px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-sub);flex-shrink:0;}
.exercise-card.done .ex-num{background:var(--green);color:var(--yellow);}
.ex-body{flex:1;}
.ex-name{font-size:17px;font-weight:700;color:var(--text);}
.ex-reps{font-size:14px;color:var(--text-hint);margin-top:2px;}
.ex-check{font-size:20px;color:var(--text-hint);}
.exercise-card.done .ex-check{color:var(--green);}
.ex-desc{font-size:14px;color:var(--text-sub);line-height:1.65;padding:0 15px 13px;border-top:1px solid var(--border);padding-top:10px;}

/* 운동 완료 미니 바 */
.mini-prog-bar{height:3px;background:var(--bg2);border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.mini-prog-fill{height:100%;background:var(--green);transition:width .3s;}

/* 유산소 섹션 */
.cardio-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.cardio-icon{font-size:28px;}
.cardio-body{flex:1;}
.cardio-title{font-size:16px;font-weight:700;color:var(--text);}
.cardio-sub{font-size:14px;color:var(--text-hint);margin-top:2px;}
.cardio-done-btn{font-size:14px;padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--text-sub);cursor:pointer;transition:all .15s;white-space:nowrap;}
.cardio-done-btn.done{background:var(--green);color:var(--yellow);border-color:var(--green);}

/* 완료 축하 */
.workout-complete{text-align:center;padding:2rem 1rem;display:none;}
.workout-complete.show{display:block;}
.wc-emoji{font-size:52px;margin-bottom:.75rem;}
.wc-msg{font-size:20px;font-weight:700;color:var(--text);margin-bottom:.5rem;}
.wc-sub{font-size:15px;color:var(--text-hint);line-height:1.6;word-break:keep-all;padding:0 .5rem;}
.wc-sub{font-size:15px;color:var(--text-hint);}

/* 식단 카드 */
.diet-meal-row{display:flex;align-items:flex-start;gap:10px;padding:4px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.diet-time{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--green);opacity:.6;width:32px;flex-shrink:0;padding-top:3px;}
.diet-menu{font-size:16px;color:var(--text);line-height:1.5;}
.diet-desc{font-size:14px;color:var(--text-sub);line-height:1.6;margin-top:5px;display:none;border-top:1px solid var(--border);padding-top:6px;}
.diet-clickable.open .diet-desc{display:block;}
.diet-arrow{font-size:18px;color:var(--text-hint);transition:transform .2s;flex-shrink:0;padding-top:1px;}
.diet-clickable.open .diet-arrow{transform:rotate(90deg);}
.diet-divider{height:1px;background:var(--border);margin:9px 0;}
.diet-rest{font-size:15px;color:var(--text-hint);font-style:italic;padding:4px 0;}

/* 냉털 탭 ══ */
.api-key-row{display:flex;gap:8px;padding:.7rem .9rem;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:12px;}
.api-key-inp{flex:1;font-family:var(--font);font-size:13px;border:none;background:transparent;color:var(--text);outline:none;}
.api-key-inp::placeholder{color:var(--text-hint);}
.api-key-save{font-size:13px;padding:5px 12px;border-radius:99px;border:none;background:var(--green);color:var(--yellow);cursor:pointer;}
.fridge-add-row{display:flex;gap:7px;margin-bottom:.75rem;}
.fridge-inp{flex:1;font-family:var(--font);font-size:16px;color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);padding:8px 11px;outline:none;}
.fridge-inp::placeholder{color:var(--text-hint);}
.fridge-add-btn{font-size:16px;padding:8px 14px;border-radius:var(--r-sm);border:none;background:var(--green);color:var(--yellow);cursor:pointer;font-weight:700;}
.fridge-date-row{display:flex;gap:7px;margin-bottom:.9rem;}
.fridge-date-field{flex:1;display:flex;flex-direction:column;gap:4px;}
.fridge-date-lbl{font-size:13px;color:var(--text-hint);}
.fridge-date-inp{font-family:var(--font);font-size:14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text-sub);padding:7px 9px;outline:none;width:100%;}
.fridge-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem;}
.fridge-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);}
.fridge-item.selected{border-color:var(--green);background:#FFF9E5;}
.fridge-item.expiring{border-color:var(--high);border-width:1.5px;}
.fridge-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;color:transparent;font-size:12px;}
.fridge-item.selected .fridge-check{background:var(--green);border-color:var(--green);color:var(--yellow);}
.fridge-info{flex:1;min-width:0;}
.fridge-name{font-size:16px;color:var(--text);font-weight:700;}
.fridge-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap;}
.fridge-date-label{font-size:13px;color:var(--text-hint);}
.fridge-expiry-alert{font-size:12px;color:var(--high);font-weight:700;}
.fridge-del{font-size:14px;color:var(--text-hint);border:none;background:transparent;cursor:pointer;padding:3px 6px;}
.fridge-actions{display:flex;gap:7px;align-items:center;margin-bottom:.75rem;}
.fridge-sel-label{font-size:14px;color:var(--text-sub);flex:1;}
.fridge-suggest-btn{font-size:14px;padding:9px 15px;border-radius:var(--r-sm);border:none;background:var(--green);color:var(--yellow);cursor:pointer;font-weight:700;white-space:nowrap;}
.fridge-suggest-btn:disabled{opacity:.4;cursor:default;}
.fridge-result{font-size:16px;line-height:1.8;color:var(--text-sub);background:var(--surface2);border-radius:var(--r-sm);padding:.85rem 1rem;border:1px solid var(--border);white-space:pre-wrap;min-height:48px;}
.fridge-result.loading{color:var(--text-hint);font-style:italic;}
.fridge-empty{text-align:center;padding:1.5rem 0;color:var(--text-hint);font-size:15px;}

/* ══ 참깨 탭 ══ */
.care-items{display:flex;flex-direction:column;gap:8px;margin-bottom:1.1rem;}
.care-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 13px;}
.care-item-top{display:flex;align-items:center;gap:10px;}
.care-item-icon{font-size:20px;flex-shrink:0;}
.care-item-body{flex:1;min-width:0;}
.care-item-name{font-size:16px;font-weight:700;color:var(--text);}
.care-item-due{font-size:14px;margin-top:2px;}
.care-item-due.ok{color:var(--low);}.care-item-due.warn{color:var(--mid);}.care-item-due.over{color:var(--high);}
.care-last-who{font-size:12px;color:var(--text-hint);margin-top:2px;}
.care-btn-row{display:flex;gap:5px;flex-wrap:wrap;}
.care-done-btn{font-size:13px;padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text-sub);cursor:pointer;white-space:nowrap;transition:all .15s;}
.care-done-btn:active{background:var(--green);color:var(--yellow);border-color:var(--green);}
.care-edit-btn{font-size:13px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-hint);cursor:pointer;}
.care-edit-panel{display:none;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);flex-direction:column;gap:7px;}
.care-edit-panel.show{display:flex;}
.care-edit-row{display:flex;align-items:center;gap:7px;}
.care-edit-label{font-size:14px;color:var(--text-hint);min-width:52px;}
.care-edit-inp{font-family:var(--font);font-size:14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);padding:6px 10px;outline:none;flex:1;}
.care-save-btn{font-size:14px;padding:6px 13px;border-radius:99px;border:none;background:var(--green);color:var(--yellow);cursor:pointer;}
.supply-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.supply-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 11px;}
.supply-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.supply-name{font-size:15px;font-weight:700;color:var(--text);}
.supply-pct-badge{font-size:15px;font-weight:700;color:var(--green);}
.supply-pct-badge.low-stock{color:var(--high);}
.supply-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.supply-bar{height:100%;border-radius:99px;background:var(--green);transition:width .3s;}
.supply-bar.low-stock{background:var(--high);}
.supply-slider{width:100%;margin-bottom:8px;accent-color:var(--green);}
.supply-order-btn{width:100%;font-size:14px;padding:6px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-sub);cursor:pointer;transition:all .15s;}
.supply-order-btn:active{background:var(--green);color:var(--yellow);border-color:var(--green);}
.supply-order-btn.ordered{background:#E8F0EE;color:var(--low);border-color:#9ABFBA;}

/* ══ 메모 플로팅 버튼 ══ */
.fab{position:fixed;bottom:calc(var(--tab-h) + 16px);right:16px;width:48px;height:48px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(0,54,49,.25);z-index:100;-webkit-tap-highlight-color:transparent;}
.memo-sheet{position:fixed;bottom:var(--tab-h);left:0;right:0;background:var(--surface);border-radius:var(--r) var(--r) 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);z-index:99;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto;}
.memo-sheet.open{transform:translateY(0);}
.memo-sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--border2);margin:10px auto 0;}
.memo-sheet-inner{padding:1rem 1.25rem 1.5rem;}
.memo-sheet-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.9rem;}
.memo-list{display:flex;flex-direction:column;gap:7px;margin-bottom:.9rem;max-height:180px;overflow-y:auto;}
.memo-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;}
.memo-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.memo-item-author{font-size:14px;font-weight:700;color:var(--text-sub);}
.memo-item-date{font-size:12px;color:var(--text-hint);}
.memo-item-text{font-size:14px;color:var(--text);line-height:1.55;white-space:pre-wrap;word-break:break-all;}
.memo-item-img{margin-top:5px;max-width:100%;border-radius:6px;display:block;}
.memo-item-del{font-size:12px;color:var(--text-hint);border:none;background:transparent;cursor:pointer;padding:2px 5px;}
.memo-add-area{display:flex;flex-direction:column;gap:7px;}
.memo-author-inp,.memo-content-inp{font-family:var(--font);font-size:15px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);padding:8px 11px;outline:none;width:100%;}
.memo-author-inp::placeholder,.memo-content-inp::placeholder{color:var(--text-hint);}
.memo-content-inp{resize:none;line-height:1.5;}
.memo-bottom-row{display:flex;gap:7px;align-items:center;}
.memo-photo-btn{font-size:13px;padding:7px 11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text-sub);cursor:pointer;}
.memo-submit-btn{font-size:15px;padding:8px 16px;border-radius:var(--r-sm);border:none;background:var(--green);color:var(--yellow);cursor:pointer;font-weight:700;margin-left:auto;}
.memo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:98;display:none;}
.memo-overlay.show{display:block;}

button{font-family:var(--font);}
</style>
</head>
<body>

<!-- ══ 상단 고정 ══ -->
<div class="top-fixed">
  <div class="top-row1">
    <div class="app-left">
      <span class="app-title">MY HOMIE</span>
      <span class="app-date" id="app-date"></span>
    </div>
    <div class="app-time" id="clock">--:--</div>
  </div>
  <div id="weather-wrap">
    <div class="weather-loading">날씨 불러오는 중…</div>
  </div>
  <div class="music-row" style="margin-top:.65rem;">
    <div class="mood-chip" onclick="openMusic('lofi chill evening')"><span class="mood-chip-icon">🌙</span><span class="mood-chip-label">릴렉스</span></div>
    <div class="mood-chip" onclick="openMusic('cooking background music upbeat')"><span class="mood-chip-icon">🍳</span><span class="mood-chip-label">요리</span></div>
    <div class="mood-chip" onclick="openMusic('focus instrumental study')"><span class="mood-chip-icon">✏️</span><span class="mood-chip-label">집중</span></div>
    <div class="mood-chip" onclick="openMusic('sleep calm piano')"><span class="mood-chip-icon">💤</span><span class="mood-chip-label">취침</span></div>
    <div class="mood-chip" onclick="openMusic('korean indie emotional')"><span class="mood-chip-icon">🫶</span><span class="mood-chip-label">감성</span></div>
    <div class="mood-chip" onclick="openMusic('jazz bossa nova evening')"><span class="mood-chip-icon">🎷</span><span class="mood-chip-label">재즈</span></div>
  </div>
</div>

<!-- ══ 탭 영역 ══ -->
<div class="tab-area">
  <div class="tabbar">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')"><span class="tab-icon">🏠</span><span class="tab-label">홈</span></button>
    <button class="tab-btn" data-tab="todo" onclick="switchTab('todo')"><span class="tab-icon">✅</span><span class="tab-label">할일</span></button>
    <button class="tab-btn" data-tab="sched" onclick="switchTab('sched')"><span class="tab-icon">📅</span><span class="tab-label">일정</span></button>
    <button class="tab-btn" data-tab="workout" onclick="switchTab('workout')"><span class="tab-icon">💪</span><span class="tab-label">운동</span></button>
    <button class="tab-btn" data-tab="fridge" onclick="switchTab('fridge')"><span class="tab-icon">🧊</span><span class="tab-label">냉털</span></button>
    <button class="tab-btn" data-tab="care" onclick="switchTab('care')"><span class="tab-icon">🐱</span><span class="tab-label">참깨</span></button>
  </div>

  <!-- 홈 -->
  <div class="tab-content active" id="tab-home">
    <div class="tab-inner">
      <div class="home-section">
        <div class="home-sec-label">오늘 할 일</div>
        <div class="card card-pad" id="home-todo-list"></div>
      </div>
      <div class="home-section">
        <div class="home-sec-label">오늘 운동</div>
        <div class="card card-pad" id="home-workout-preview"></div>
      </div>
      <div class="home-section">
        <div class="home-sec-label">참깨 알럿</div>
        <div class="card card-pad" id="home-care-list"></div>
      </div>
    </div>
  </div>

  <!-- 할일 -->
  <div class="tab-content" id="tab-todo">
    <div class="tab-inner">
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-label" id="prog-label">0 / 0</span>
      </div>
      <div class="date-scroll" id="date-tabs"></div>
      <div class="todo-add">
        <button class="todo-add-icon" onclick="addTodo()">+</button>
        <input class="todo-add-input" id="add-input" type="text" placeholder="새 할 일" maxlength="80" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="prio-btn pm" id="prio-btn" onclick="cyclePrio()">보통</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>
  </div>

  <!-- 일정 -->
  <div class="tab-content" id="tab-sched">
    <div class="tab-inner">
      <div class="sec-title">누구 일정?</div>
      <div class="sched-who-row">
        <button class="sched-who-btn sel-me" id="who-me" onclick="selectWho('me')">은호</button>
        <button class="sched-who-btn" id="who-partner" onclick="selectWho('partner')">리아</button>
        <button class="sched-who-btn" id="who-both" onclick="selectWho('both')">공동</button>
      </div>
      <div class="sched-add-row">
        <input class="sched-inp" id="sched-title-inp" type="text" placeholder="일정 이름" maxlength="40">
        <input class="sched-time-inp" id="sched-time-inp" type="time">
        <button class="sched-add-btn" onclick="addSched()">+</button>
      </div>
      <div class="sched-date-row">
        <input class="sched-date-inp" id="sched-start-inp" type="date">
        <span class="sched-date-sep">~</span>
        <input class="sched-date-inp" id="sched-end-inp" type="date">
      </div>
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="calMove(-1)">‹</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="cal-nav" onclick="calMove(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="cal-day-title" id="cal-day-title"></div>
      <div class="sched-list" id="sched-list"></div>
    </div>
  </div>

  <!-- 운동 -->
  <div class="tab-content" id="tab-workout">
    <div class="tab-inner">
      <div class="workout-header" id="workout-header"></div>
      <div class="grape-board" id="grape-board"></div>
      <div class="sec-title">근력 운동</div>
      <div id="exercise-list"></div>
      <div class="sec-title" style="margin-top:4px;">유산소</div>
      <div id="cardio-section"></div>
      <div class="workout-complete" id="workout-complete">
        <div class="wc-emoji">🎉</div>
        <div class="wc-msg">오늘도 완료!</div>
        <div class="wc-sub" id="wc-sub"></div>
      </div>
    </div>
  </div>

  <!-- 냉털 -->
  <div class="tab-content" id="tab-fridge">
    <div class="tab-inner">
      <div class="sec-title">오늘 식단</div>
      <div class="card card-pad" id="diet-card" style="margin-bottom:14px;"></div>
      <div class="api-key-row">
        <input class="api-key-inp" id="api-key-inp" type="password" placeholder="Gemini API 키 (메뉴 추천에 필요)">
        <button class="api-key-save" onclick="saveApiKey()">저장</button>
      </div>
      <div class="sec-title">재료 추가</div>
      <div class="fridge-add-row">
        <input class="fridge-inp" id="fridge-name-inp" type="text" placeholder="재료 이름" maxlength="30" onkeydown="if(event.key==='Enter')addFridge()">
        <button class="fridge-add-btn" onclick="addFridge()">+</button>
      </div>
      <div class="fridge-date-row">
        <div class="fridge-date-field">
          <label class="fridge-date-lbl">구입일 <span style="color:var(--high)">*</span></label>
          <input class="fridge-date-inp" id="fridge-bought-inp" type="date">
        </div>
        <div class="fridge-date-field">
          <label class="fridge-date-lbl">유통기한 <span style="font-size:11px;color:var(--text-hint)">(선택)</span></label>
          <input class="fridge-date-inp" id="fridge-exp-inp" type="date">
        </div>
      </div>
      <div class="sec-title">냉장고 재료</div>
      <div class="fridge-list" id="fridge-list"></div>
      <div class="fridge-actions">
        <span class="fridge-sel-label" id="fridge-sel-label">재료를 선택하세요</span>
        <button class="fridge-suggest-btn" id="fridge-suggest-btn" onclick="suggestMeal()" disabled>메뉴 추천</button>
      </div>
      <div class="fridge-result" id="fridge-result">체크한 재료로 저녁 메뉴를 추천해드릴게요.</div>
    </div>
  </div>

  <!-- 참깨 -->
  <div class="tab-content" id="tab-care">
    <div class="tab-inner">
      <div class="sec-title">케어 주기</div>
      <div class="care-items" id="care-items"></div>
      <div class="sec-title">소모품</div>
      <div class="supply-grid" id="supply-grid"></div>
    </div>
  </div>
</div>

<!-- 메모 FAB -->
<button class="fab" onclick="toggleMemo()">📝</button>
<div class="memo-overlay" id="memo-overlay" onclick="toggleMemo()"></div>
<div class="memo-sheet" id="memo-sheet">
  <div class="memo-sheet-handle"></div>
  <div class="memo-sheet-inner">
    <div class="memo-sheet-title">메모</div>
    <div class="memo-list" id="memo-list"></div>
    <div class="memo-add-area">
      <input class="memo-author-inp" id="memo-author" type="text" placeholder="작성자" maxlength="20">
      <textarea class="memo-content-inp" id="memo-content" rows="3" placeholder="메모 내용…"></textarea>
      <div class="memo-bottom-row">
        <label class="memo-photo-btn">📷 사진<input type="file" accept="image/*" capture="environment" id="memo-photo-inp" style="display:none" onchange="previewMemoPhoto(this)"></label>
        <button class="memo-submit-btn" onclick="addMemo()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const DAYS=['일','월','화','수','목','금','토'];
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return ds(new Date());}

/* ── 시계 ── */
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('app-date').textContent=(n.getMonth()+1)+'.'+n.getDate()+'('+DAYS[n.getDay()]+')';
}
setInterval(updateClock,10000);

/* ── 날씨 ── */
const LAT=37.2720,LON=127.4349;
const WX={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',51:'이슬비',53:'이슬비',61:'비',63:'비',65:'강한 비',71:'눈',73:'눈',80:'소나기',95:'뇌우'};
async function loadWeather(){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,precipitation&timezone=Asia%2FSeoul`);
    const d=await r.json();const c=d.current;
    document.getElementById('weather-wrap').innerHTML=`
      <div class="weather-row">
        <div class="weather-temp">${Math.round(c.temperature_2m)}<sup>°</sup></div>
        <div class="weather-info">
          <div class="weather-desc">${WX[c.weathercode]||'알 수 없음'}</div>
          <div class="weather-sub">체감 ${Math.round(c.apparent_temperature)}° · 이천시</div>
        </div>
      </div>
      <div class="weather-detail">
        <div class="wd-item"><div class="wd-label">습도</div><div class="wd-val">${Math.round(c.relativehumidity_2m)}%</div></div>
        <div class="wd-item"><div class="wd-label">강수</div><div class="wd-val">${c.precipitation}mm</div></div>
        <div class="wd-item"><div class="wd-label">바람</div><div class="wd-val">${Math.round(c.windspeed_10m)}km/h</div></div>
      </div>`;
  }catch(e){document.getElementById('weather-wrap').innerHTML='<div class="weather-loading">날씨를 불러올 수 없어요.</div>';}
}

function addGrape(n){
  const g=getGrapes();
  const prev=Math.floor(g.total/30);
  g.total+=n;
  const now=Math.floor(g.total/30);
  saveGrapes(g);
  if(now>prev){setTimeout(()=>showGrapeReward(),300);}
}
function removeGrape(n){const g=getGrapes();g.total=Math.max(0,g.total-n);saveGrapes(g);}

}

function renderWorkout(){
  const wd=getTodayWorkoutData();
  const state=getWorkoutState();
  const total=wd.exercises.length+(wd.cardio?1:0);
  const doneCount=state.done.length+(state.cardioDone?1:0);

  // 헤더
  document.getElementById('workout-header').innerHTML=`
    <div class="workout-day-theme">${wd.theme}</div>
    <div class="workout-day-sub">세트 사이 60초 휴식 · 3세트 기준</div>
    <div class="workout-progress-wrap">
      <div class="workout-prog-label"><span>오늘 달성</span><span>${doneCount} / ${total}</span></div>
      <div class="workout-prog-track"><div class="workout-prog-fill" style="width:${total?Math.round(doneCount/total*100):0}%"></div></div>
    </div>`;

  // 포도알
  renderGrapeBoard();

  // 운동 목록
  const list=document.getElementById('exercise-list');list.innerHTML='';
  wd.exercises.forEach((ex,i)=>{
    const done=state.done.includes(i);
    const card=document.createElement('div');card.className='exercise-card'+(done?' done':'');
    card.innerHTML=`
      <div class="exercise-card-top">
        <div class="ex-num">${done?'✓':i+1}</div>
        <div class="ex-body"><div class="ex-name">${ex.name}</div><div class="ex-reps">${ex.reps}</div></div>
        <div class="ex-check">${done?'✅':'○'}</div>
      </div>
      <div class="ex-desc">${ex.desc}</div>
      <div class="mini-prog-bar"><div class="mini-prog-fill" style="width:${done?100:0}%"></div></div>`;
    card.onclick=()=>{
      const s=getWorkoutState();
      if(!done){
        if(!s.done.includes(i)){s.done.push(i);saveWorkoutState(s);}
      } else {
        s.done=s.done.filter(x=>x!==i);saveWorkoutState(s);
      }
      renderWorkout();checkWorkoutComplete();
    };
    list.appendChild(card);
  });

  // 유산소
  const cardioSec=document.getElementById('cardio-section');
  cardioSec.innerHTML=`
    <div class="cardio-card">
      <div class="cardio-icon">🏃</div>
      <div class="cardio-body">
        <div class="cardio-title">유산소</div>
        <div class="cardio-sub">${wd.cardio}</div>
      </div>
      <button class="cardio-done-btn${state.cardioDone?' done':''}" onclick="markCardioDone()">
        ${state.cardioDone?'✅ 취소':'완료'}
      </button>
    </div>`;

  checkWorkoutComplete();
}

function markCardioDone(){
  const s=getWorkoutState();
  if(!s.cardioDone){s.cardioDone=true;saveWorkoutState(s);}
  else{s.cardioDone=false;saveWorkoutState(s);}
  renderWorkout();
}

function checkWorkoutComplete(){
  const wd=getTodayWorkoutData();const s=getWorkoutState();
  const total=wd.exercises.length+(wd.cardio?1:0);
  const doneCount=s.done.length+(s.cardioDone?1:0);
  const comp=document.getElementById('workout-complete');
  const wasComplete=s.grapedToday===true;
  const isComplete=total>0&&doneCount>=total;

  if(isComplete){
    if(!wasComplete){
      // 오늘 처음 완료 → 포도알 1개
      s.grapedToday=true;saveWorkoutState(s);addGrape(1);
    }
    const g=getGrapes();
    comp.classList.add('show');
    document.getElementById('wc-sub').textContent='오늘도 완벽 완료! 포도알 총 '+g.total+'개 🍇';
  } else {
    if(wasComplete){
      // 완료 상태였다가 취소 → 포도알 1개 반환
      s.grapedToday=false;saveWorkoutState(s);removeGrape(1);
    }
    comp.classList.remove('show');
  }
  renderGrapeBoard();
}

function renderHome(){
  // 할일
  const todayTodos=tload(todayStr()).filter(t=>!t.done).slice(0,4);
  const htl=document.getElementById('home-todo-list');
  if(!todayTodos.length){htl.innerHTML='<div class="home-empty">오늘 할 일이 없어요 ✨</div>';}
  else htl.innerHTML=todayTodos.map(t=>`<div class="home-todo-item"><div class="home-todo-dot"></div><div class="home-todo-text">${t.text}</div></div>`).join('');

  // 운동
  const wd=getTodayWorkoutData();const s=getWorkoutState();
  const hwp=document.getElementById('home-workout-preview');
  const remaining=wd.exercises.filter((_,i)=>!s.done.includes(i));
  hwp.innerHTML=`<div class="home-workout-theme">${wd.theme}</div><div class="home-workout-list">${
    remaining.length?remaining.slice(0,3).map(e=>`<div class="home-workout-item">· ${e.name} ${e.reps}</div>`).join('')
    :'<div class="home-empty">오늘 운동 완료! 🎉</div>'
  }</div>`;

  // 참깨
  const careArr=loadCare();const alerts=careArr.filter(x=>{const d=dueLabel(x);return d.cls!=='ok';});
  const hcl=document.getElementById('home-care-list');
  if(!alerts.length){hcl.innerHTML='<div class="home-care-ok">참깨 모두 정상이에요 🐱</div>';}
  else hcl.innerHTML=alerts.map(x=>{const d=dueLabel(x);return`<div class="home-care-item"><span class="home-care-icon">${x.icon}</span><div class="home-care-body"><div class="home-care-name">${x.name}</div><div class="home-care-due">${d.text}</div></div></div>`;}).join('');
}

/* ── 할일 ── */
const PL={high:'높음',mid:'보통',low:'낮음'};const PRIOS=['low','mid','high'];
let curPrio='mid',selDate=todayStr();
function tkey(d){return 'hb_todo_'+d;}
function tload(d){try{return JSON.parse(localStorage.getItem(tkey(d)))||[];}catch{return[];}}
function tsave(d,a){localStorage.setItem(tkey(d),JSON.stringify(a));}
function cyclePrio(){curPrio=PRIOS[(PRIOS.indexOf(curPrio)+1)%3];const b=document.getElementById('prio-btn');b.textContent=PL[curPrio];b.className='prio-btn p'+curPrio[0];}
function addTodo(){const inp=document.getElementById('add-input'),t=inp.value.trim();if(!t)return;const a=tload(selDate);a.unshift({id:Date.now(),text:t,prio:curPrio,memo:'',done:false});tsave(selDate,a);inp.value='';renderTodo();inp.focus();}
function buildDateTabs(){
  const wrap=document.getElementById('date-tabs');wrap.innerHTML='';const now=new Date();
  for(let i=-1;i<=5;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);const dstr=ds(d),todos=tload(dstr);
    const tab=document.createElement('button');tab.className='dtab'+(dstr===selDate?' active':'');
    const dn=document.createElement('span');dn.className='dn';dn.textContent=i===-1?'어제':i===0?'오늘':i===1?'내일':DAYS[d.getDay()];
    const dd=document.createElement('span');dd.className='dd';dd.textContent=d.getDate();
    const dots=document.createElement('div');dots.className='dots';
    for(let j=0;j<Math.min(todos.length,4);j++){const dot=document.createElement('div');dot.className='dot';dots.appendChild(dot);}
    tab.appendChild(dn);tab.appendChild(dd);tab.appendChild(dots);tab.onclick=()=>{selDate=dstr;renderTodo();};wrap.appendChild(tab);
  }
}
function renderTodo(){

function makeTodoItem(todo,idx){

function setupSwipe(outer,item,bgD,bgX,idx){
  let sx=0,cx=0,sy=0,sw=false;const TH=75;
  outer.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=false;},{passive:true});
  outer.addEventListener('touchmove',e=>{cx=e.touches[0].clientX;const dx=cx-sx,dy=e.touches[0].clientY-sy;if(!sw&&Math.abs(dy)>Math.abs(dx))return;if(Math.abs(dx)>8)sw=true;if(!sw)return;e.preventDefault();const cl=Math.max(-130,Math.min(130,dx));item.style.transform='translateX('+cl+'px)';bgD.style.display=dx>0?'flex':'none';bgX.style.display=dx<0?'flex':'none';},{passive:false});
  outer.addEventListener('touchend',()=>{if(!sw){item.style.transform='';return;}const dx=cx-sx;if(dx>TH){item.style.transform='translateX(110%)';setTimeout(()=>ttoggle(idx),160);}else if(dx<-TH){item.style.transform='translateX(-110%)';setTimeout(()=>tdel(idx),160);}else item.style.transform='';bgD.style.display='';bgX.style.display='';sw=false;},{passive:true});
}

function renderDiet(){
  const day=DAYS[new Date().getDay()];
  const d=DIET[day];
  const card=document.getElementById('diet-card');
  if(!card)return;
  if(!d||!d.morning){card.innerHTML='<div class="diet-rest">오늘은 자유식! 🌿</div>';return;}

  function mealHTML(time,meal){
    return `<div class="diet-meal-row diet-clickable" onclick="toggleDietDesc(this)">
      <span class="diet-time">${time}</span>
      <div style="flex:1;">
        <div class="diet-menu">${meal.name}</div>
        <div class="diet-desc">${meal.desc}</div>
      </div>
      <span class="diet-arrow">›</span>
    </div>`;
  }

  card.innerHTML=`
    ${mealHTML('아침',d.morning)}
    <div class="diet-divider"></div>
    ${mealHTML('저녁',d.evening)}`;
}

function toggleDietDesc(el){
  el.classList.toggle('open');
}
